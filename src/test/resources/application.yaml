server:
  port: 8080

spring:
  application:
    name: issueflow
  # Activates the "test" profile so AdminSeeder (@Profile("!test")) is skipped
  # and tests start against an empty users table.
  profiles:
    active: test
  datasource:
    url: jdbc:h2:mem:db;MODE=PostgreSQL;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: password
    driverClassName: org.h2.Driver
  sql:
    init:
      # H2 is embedded so `embedded` mode would auto-run schema.sql; override
      # to `never` so tests rely entirely on JPA ddl-auto.
      mode: never
  h2:
    console:
      enabled: true
  jpa:
    database: POSTGRESQL
    show-sql: true
    hibernate:
      ddl-auto: update
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# Distinct test secret so a leak in either env never affects the other.
issueflow:
  jwt:
    secret: "test-only-secret-do-not-use-anywhere-real-pls"
    expires-in-seconds: 3600
    issuer: "issueflow-test"
